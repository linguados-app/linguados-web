name: 🤖 AI README Architect

on:
  workflow_dispatch:

  schedule:
    # Todo domingo meia-noite UTC
    - cron: "0 0 * * 0"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ai-readme-generator
  cancel-in-progress: true

jobs:
  ai-readme:
    name: 🧠 Analyze Repository & Rewrite README
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚡ Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install Dependencies
        run: |
          pip install google-genai

      - name: 🌳 Install Tree
        run: |
          sudo apt-get update
          sudo apt-get install -y tree

      - name: 🧠 Analyze Repository Structure
        run: |
          echo "📂 Generating repository map..."

          tree -I '.git|node_modules|dist|build|venv|__pycache__|.next|coverage' -L 4 > structure.txt || true

          echo "📜 Extracting important files..."

          mkdir -p context

          touch context/repository_context.txt

          for file in $(find . \
            -type f \
            \( -name "*.py" \
            -o -name "*.js" \
            -o -name "*.ts" \
            -o -name "*.tsx" \
            -o -name "*.jsx" \
            -o -name "*.java" \
            -o -name "*.go" \
            -o -name "*.rs" \
            -o -name "*.php" \
            -o -name "*.rb" \
            -o -name "*.cs" \
            -o -name "*.cpp" \
            -o -name "*.c" \
            -o -name "*.swift" \
            -o -name "*.kt" \
            -o -name "*.html" \
            -o -name "*.css" \
            -o -name "*.scss" \
            -o -name "*.json" \
            -o -name "*.yaml" \
            -o -name "*.yml" \
            -o -name "*.md" \
            -o -name "package.json" \
            -o -name "requirements.txt" \
            -o -name "Cargo.toml" \
            -o -name "pom.xml" \
            -o -name "Dockerfile" \
            \) \
            ! -path "*/node_modules/*" \
            ! -path "*/dist/*" \
            ! -path "*/build/*" \
            ! -path "*/coverage/*" \
            ! -path "*/.next/*" \
            | head -n 150)
          do
            echo "========== $file ==========" >> context/repository_context.txt
            head -n 300 "$file" >> context/repository_context.txt || true
            echo "" >> context/repository_context.txt
          done

      - name: 🤖 Generate README with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

        run: |
          python << 'EOF'
          from google import genai
          from pathlib import Path
          import os

          client = genai.Client(
              api_key=os.environ["GEMINI_API_KEY"]
          )

          structure = Path("structure.txt").read_text(errors="ignore")

          context = Path(
              "context/repository_context.txt"
          ).read_text(errors="ignore")

          prompt = f"""
          You are an elite senior software architect.

          Analyze this repository deeply and rewrite the README.md professionally.

          IMPORTANT REQUIREMENTS:

          - Infer automatically what the project does
          - Explain architecture
          - Explain technologies used
          - Explain project structure
          - Detect frameworks automatically
          - Detect APIs/routes automatically
          - Explain installation
          - Explain usage
          - Generate examples
          - Generate badges
          - Add emojis
          - Generate feature list
          - Generate troubleshooting section
          - Generate roadmap section
          - Generate contribution guidelines
          - Generate license section
          - Make it look like a world-class GitHub repository
          - Use beautiful markdown formatting
          - Add code blocks where useful
          - Create tables when useful
          - DO NOT hallucinate fake features
          - DO NOT mention AI generated
          - Output ONLY markdown

          ==================================================
          REPOSITORY STRUCTURE
          ==================================================

          {structure}

          ==================================================
          REPOSITORY CONTENT
          ==================================================

          {context}
          """

          response = client.models.generate_content(
              model="gemini-2.5-flash",
              contents=prompt
          )

          readme = response.text

          if readme.startswith("```markdown"):
              readme = readme.replace("```markdown", "", 1)

          if readme.endswith("```"):
              readme = readme[:-3]

          Path("README.md").write_text(
              readme.strip(),
              encoding="utf-8"
          )

          print("✅ README generated successfully")
          EOF

      - name: 🔍 Preview README
        run: |
          echo "📋 README Preview:"
          head -n 80 README.md

      - name: ✅ Check For Changes
        id: diff
        run: |
          git diff --quiet README.md || echo "changed=true" >> $GITHUB_OUTPUT

      - name: 💾 Commit Changes
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "AI README Architect"
          git config user.email "ai-bot@github.com"

          git add README.md

          git commit -m "🤖 AI regenerated professional README" || exit 0

          git push

      - name: 🎉 Workflow Completed
        run: |
          echo "🚀 README regenerated successfully!"
