name: 🤖 AI README Architect

on:
  workflow_dispatch:

  schedule:
    - cron: "0 0 * * 0"

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-readme:
    name: 🧠 Analyze Repository & Rewrite README
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚡ Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install Dependencies
        run: |
          pip install google-generativeai markdownify pygments

      - name: 🧠 Analyze Repository Structure
        id: analyze
        run: |
          echo "📂 Generating repository map..."

          tree -I '.git|node_modules|dist|build|venv|__pycache__' -L 4 > structure.txt || true

          echo "📊 Counting languages..."

          find . -type f | sed 's|^\./||' > files.txt

          echo "📜 Extracting important files..."

          mkdir context

          for file in $(find . \
            -type f \
            \( -name "*.py" \
            -o -name "*.js" \
            -o -name "*.ts" \
            -o -name "*.tsx" \
            -o -name "*.jsx" \
            -o -name "*.java" \
            -o -name "*.go" \
            -o -name "*.rs" \
            -o -name "*.md" \
            -o -name "package.json" \
            -o -name "requirements.txt" \
            -o -name "pom.xml" \
            -o -name "Cargo.toml" \
            \) \
            ! -path "*/node_modules/*" \
            ! -path "*/dist/*" \
            ! -path "*/build/*" \
            | head -n 120)
          do
            echo "========== $file ==========" >> context/repository_context.txt
            head -n 250 "$file" >> context/repository_context.txt || true
            echo "" >> context/repository_context.txt
          done

      - name: 🤖 Generate README with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.AIzaSyBdbBJHFaiwiWBTbog-Nb0z-GPFBnnR2-U }}
        run: |
          cat > generate_readme.py << 'EOF'
          import google.generativeai as genai
          from pathlib import Path
          import os

          genai.configure(api_key=os.environ["AIzaSyBdbBJHFaiwiWBTbog-Nb0z-GPFBnnR2-U"])

          model = genai.GenerativeModel("gemini-1.5-pro")

          structure = Path("structure.txt").read_text(errors="ignore")
          context = Path("context/repository_context.txt").read_text(errors="ignore")

          prompt = f"""
          You are an elite senior software architect.

          Your task:
          Analyze this repository deeply and generate a PROFESSIONAL README.md.

          IMPORTANT:
          - Infer what the project does from the source code
          - Explain architecture
          - Explain technologies
          - Explain installation
          - Explain usage
          - Explain API/routes if present
          - Explain folder structure
          - Detect features automatically
          - Generate badges
          - Generate a clean modern README
          - Add emojis
          - Generate setup instructions
          - Generate contributing section
          - Generate license section
          - Generate troubleshooting section
          - Generate roadmap ideas
          - Generate examples if possible
          - Make it look like a top GitHub repository

          REPOSITORY STRUCTURE:
          {structure}

          REPOSITORY CONTENT:
          {context}

          Output ONLY markdown.
          """

          response = model.generate_content(prompt)

          readme = response.text

          Path("README.md").write_text(readme)

          print("✅ README generated successfully")
          EOF

          python generate_readme.py

      - name: 🔍 Preview README
        run: |
          echo "📋 README Preview:"
          head -n 80 README.md

      - name: ✅ Check Changes
        id: diff
        run: |
          git diff --quiet README.md || echo "changed=true" >> $GITHUB_OUTPUT

      - name: 💾 Commit Changes
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "AI README Architect"
          git config user.email "ai-bot@github.com"

          git add README.md

          git commit -m "🤖 AI regenerated professional README"

          git push

      - name: 🎉 Finish
        run: |
          echo "🚀 README regenerated using AI analysis"
