name: 🚀 Ultra README AI Updater

on:
  workflow_dispatch:
    inputs:
      create_pr:
        description: "Criar Pull Request?"
        required: false
        default: false
        type: boolean

  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: readme-updater
  cancel-in-progress: true

jobs:
  update-readme:
    name: 🧠 Smart README Automation
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚡ Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y jq cloc

      - name: 📊 Collect Advanced Repository Stats
        id: stats
        run: |
          echo "🔍 Coletando métricas..."

          COMMIT_COUNT=$(git rev-list --count HEAD)
          echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT

          CONTRIBUTORS=$(git shortlog -sn --all | wc -l)
          echo "contributors=$CONTRIBUTORS" >> $GITHUB_OUTPUT

          BRANCH=$(git branch --show-current)
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

          LAST_COMMIT=$(git log -1 --pretty=format:'%s')
          echo "last_commit=$LAST_COMMIT" >> $GITHUB_OUTPUT

          LAST_AUTHOR=$(git log -1 --pretty=format:'%an')
          echo "last_author=$LAST_AUTHOR" >> $GITHUB_OUTPUT

          LOC=$(cloc . --json | jq '.SUM.code')
          echo "loc=$LOC" >> $GITHUB_OUTPUT

          FILES=$(find . -type f | wc -l)
          echo "files=$FILES" >> $GITHUB_OUTPUT

          SIZE=$(du -sh . | cut -f1)
          echo "size=$SIZE" >> $GITHUB_OUTPUT

          DATE=$(date '+%d/%m/%Y %H:%M UTC')
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: 🎨 Generate Dynamic README Section
        run: |
          cat > AUTO_README.md <<EOF
          ## 🤖 Projeto Atualizado Automaticamente

          > Última atualização automática: **${{ steps.stats.outputs.date }}**

          ---

          # 📈 Estatísticas do Projeto

          | Métrica | Valor |
          |---|---|
          | 🚀 Commits | ${{ steps.stats.outputs.commit_count }} |
          | 👥 Contribuidores | ${{ steps.stats.outputs.contributors }} |
          | 🧠 Linhas de Código | ${{ steps.stats.outputs.loc }} |
          | 📂 Arquivos | ${{ steps.stats.outputs.files }} |
          | 💾 Tamanho | ${{ steps.stats.outputs.size }} |
          | 🌿 Branch Atual | ${{ steps.stats.outputs.branch }} |

          ---

          # 🔥 Última Atividade

          - ✍️ Último Commit:
            > "${{ steps.stats.outputs.last_commit }}"

          - 👤 Autor:
            > ${{ steps.stats.outputs.last_author }}

          ---

          # ⚡ Status

          ![GitHub repo size](https://img.shields.io/github/repo-size/${{ github.repository }})
          ![GitHub stars](https://img.shields.io/github/stars/${{ github.repository }})
          ![GitHub forks](https://img.shields.io/github/forks/${{ github.repository }})
          ![GitHub last commit](https://img.shields.io/github/last-commit/${{ github.repository }})

          ---

          EOF

      - name: 📝 Inject Content Into README
        run: |
          touch README.md

          if grep -q "<!-- AUTO_SECTION_START -->" README.md; then
            sed -i '/<!-- AUTO_SECTION_START -->/,/<!-- AUTO_SECTION_END -->/d' README.md
          fi

          cat AUTO_README.md > TEMP.md
          echo "<!-- AUTO_SECTION_START -->" >> TEMP.md
          cat AUTO_README.md >> TEMP.md
          echo "<!-- AUTO_SECTION_END -->" >> TEMP.md

          echo "" >> TEMP.md
          cat README.md >> TEMP.md

          mv TEMP.md README.md

      - name: 🔍 Verify Changes
        run: |
          echo "📋 Preview README:"
          head -n 50 README.md

      - name: ✅ Check For Changes
        id: verify_diff
        run: |
          git diff --quiet README.md || echo "changed=true" >> $GITHUB_OUTPUT

      - name: 💾 Commit & Push
        if: steps.verify_diff.outputs.changed == 'true' && (!inputs.create_pr || inputs.create_pr == 'false')
        run: |
          git config user.name "Ultra README Bot"
          git config user.email "bot@github.com"

          git add README.md

          git commit -m "🤖 auto: ultra README update [skip ci]" || exit 0

          git push

      - name: 🔀 Create Pull Request
        if: steps.verify_diff.outputs.changed == 'true' && inputs.create_pr == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: bot/readme-update
          delete-branch: true
          title: "🚀 Ultra README Auto Update"
          commit-message: "🤖 auto: update README"
          body: |
            ## 🤖 Atualização Automática

            README atualizado automaticamente.

            ### 📊 Novas Métricas
            - 🚀 Commits: ${{ steps.stats.outputs.commit_count }}
            - 👥 Contributors: ${{ steps.stats.outputs.contributors }}
            - 🧠 LOC: ${{ steps.stats.outputs.loc }}

            ---
            Gerado automaticamente pelo Ultra README Bot.
          labels: |
            documentation
            automation
            github-actions

      - name: 🎉 Finish
        run: |
          echo "✅ README atualizado com sucesso!"
          echo "🚀 Workflow concluído."
