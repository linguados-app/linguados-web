name: Java CI/CD Pipeline

on:
  push:
    branches: [ "master", "dev", "release/*" ]
  pull_request:
    branches: [ "master", "dev", "release/*" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml -DskipTests

      # Exemplo de passo que só roda na Master (Produção)
      - name: Deploy to Production
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: echo "Realizando deploy para o ambiente de PRODUÇÃO..."

      # Exemplo de passo que só roda na Dev
      - name: Notify Dev Team
        if: github.ref == 'refs/heads/dev'
        run: echo "Código integrado na branch de desenvolvimento."